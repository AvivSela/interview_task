spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/urlshortener}
    username: ${SPRING_DATASOURCE_USERNAME:user}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
  cache:
    type: caffeine
  flyway:
    baseline-on-migrate: false

server:
  port: 8080
  error:
    include-message: never

logging:
  level:
    root: WARN
    com.avivly: INFO

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
      status:
        order: DOWN,OUT_OF_SERVICE,UNKNOWN,DEGRADED,UP
        http-mapping:
          DEGRADED: 200

geo:
  db:
    path: ${GEO_DB_PATH:}

jwt:
  secret: ${JWT_SECRET}
  expiry-ms: ${JWT_EXPIRY_MS:86400000}

cors:
  allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:5173}
