spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/urlshortener}
    username: ${SPRING_DATASOURCE_USERNAME:user}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
  cache:
    type: caffeine
  flyway:
    baseline-on-migrate: true
    baseline-version: 1

server:
  port: 8080
  error:
    include-message: always

logging:
  level:
    root: WARN
    com.memcyco: INFO

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

geo:
  db:
    path: ${GEO_DB_PATH:}
