apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: avivly
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      initContainers:
      - name: wait-for-backend
        image: busybox:1.36
        command:
        - sh
        - -c
        - until nc -z backend 8080; do echo "waiting for backend..."; sleep 2; done
      - name: wait-for-frontend
        image: busybox:1.36
        command:
        - sh
        - -c
        - until nc -z frontend 80; do echo "waiting for frontend..."; sleep 2; done
      containers:
      - name: nginx
        image: nginx:1.27-alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: avivly
spec:
  type: LoadBalancer
  selector:
    app: nginx
  ports:
  - port: 80
    targetPort: 80
